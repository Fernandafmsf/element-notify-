# =============================================================================
# WORKFLOW REUTILIZÁVEL — Notificações para Element (Matrix)
# =============================================================================
# Coloque este arquivo no repo central, ex: sua-org/devops
# Caminho: .github/workflows/notify-element.yml
#
# Os secrets ficam como Organization Secrets com acesso restrito
# apenas a este repo (devops). Os repos callers não têm acesso.
# =============================================================================

name: Notify Element

on:
  workflow_call:
    inputs:
      event_type:
        description: "Tipo do evento"
        required: true
        type: string
      repo_name:
        required: true
        type: string
      actor:
        required: true
        type: string
      pr_title:
        required: false
        type: string
        default: ""
      pr_url:
        required: false
        type: string
        default: ""
      pr_number:
        required: false
        type: string
        default: ""
      pr_author:
        required: false
        type: string
        default: ""
      reviewer:
        required: false
        type: string
        default: ""
      branch:
        required: false
        type: string
        default: ""
      commit_message:
        required: false
        type: string
        default: ""
      commit_url:
        required: false
        type: string
        default: ""
    # Sem bloco "secrets:" aqui — as credenciais vêm dos
    # Organization Secrets acessíveis apenas a este repo.

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Build and send Matrix message
        env:
          EVENT_TYPE:      ${{ inputs.event_type }}
          REPO_NAME:       ${{ inputs.repo_name }}
          ACTOR:           ${{ inputs.actor }}
          PR_TITLE:        ${{ inputs.pr_title }}
          PR_URL:          ${{ inputs.pr_url }}
          PR_NUMBER:       ${{ inputs.pr_number }}
          PR_AUTHOR:       ${{ inputs.pr_author }}
          REVIEWER:        ${{ inputs.reviewer }}
          BRANCH:          ${{ inputs.branch }}
          COMMIT_MESSAGE:  ${{ inputs.commit_message }}
          COMMIT_URL:      ${{ inputs.commit_url }}
          # Secrets lidos diretamente do repo central (devops)
          MATRIX_HOMESERVER:    ${{ secrets.MATRIX_HOMESERVER }}
          MATRIX_ACCESS_TOKEN:  ${{ secrets.MATRIX_ACCESS_TOKEN }}
          MATRIX_ROOM_ID:       ${{ secrets.MATRIX_ROOM_ID }}
        run: |
          case "$EVENT_TYPE" in
            pr_opened)
              EMOJI="🟢"
              TITLE="Novo PR aberto"
              BODY="**#${PR_NUMBER} — ${PR_TITLE}**\nAberto por: \`${PR_AUTHOR}\`\n🔗 ${PR_URL}"
              ;;
            review_requested)
              EMOJI="👀"
              TITLE="Review solicitado"
              BODY="**#${PR_NUMBER} — ${PR_TITLE}**\nSolicitado por: \`${ACTOR}\`  →  Revisor: \`${REVIEWER}\`\n🔗 ${PR_URL}"
              ;;
            review_approved)
              EMOJI="✅"
              TITLE="PR aprovado"
              BODY="**#${PR_NUMBER} — ${PR_TITLE}**\nAprovado por: \`${REVIEWER}\`\n🔗 ${PR_URL}"
              ;;
            review_changes_requested)
              EMOJI="🔁"
              TITLE="Mudanças solicitadas"
              BODY="**#${PR_NUMBER} — ${PR_TITLE}**\n\`${REVIEWER}\` pediu alterações\n🔗 ${PR_URL}"
              ;;
            pr_merged)
              EMOJI="🚀"
              TITLE="PR mergeado"
              BODY="**#${PR_NUMBER} — ${PR_TITLE}**\nMergeado por: \`${ACTOR}\`\n🔗 ${PR_URL}"
              ;;
            pr_closed)
              EMOJI="🚫"
              TITLE="PR fechado sem merge"
              BODY="**#${PR_NUMBER} — ${PR_TITLE}**\nFechado por: \`${ACTOR}\`\n🔗 ${PR_URL}"
              ;;
            pr_commented)
              EMOJI="💬"
              TITLE="Comentário no PR"
              BODY="**#${PR_NUMBER} — ${PR_TITLE}**\nComentado por: \`${ACTOR}\`\n🔗 ${PR_URL}"
              ;;
            push_main)
              EMOJI="📦"
              TITLE="Push na main"
              BODY="Branch: \`${BRANCH}\`\nPor: \`${ACTOR}\`\nCommit: ${COMMIT_MESSAGE}\n🔗 ${COMMIT_URL}"
              ;;
            *)
              EMOJI="ℹ️"
              TITLE="Evento: ${EVENT_TYPE}"
              BODY="Disparado por: \`${ACTOR}\`"
              ;;
          esac

          HTML_BODY=$(echo "$BODY" \
            | sed 's/\*\*\(.*\)\*\*/<strong>\1<\/strong>/g' \
            | sed 's/`\([^`]*\)`/<code>\1<\/code>/g' \
            | sed 's/$/\n/' \
            | tr '\n' ' ' \
            | sed 's/\\n/<br\/>/g')

          PAYLOAD=$(cat <<EOF
          {
            "msgtype": "m.text",
            "format": "org.matrix.custom.html",
            "body": "${EMOJI} [${REPO_NAME}] ${TITLE}",
            "formatted_body": "<p>${EMOJI} <b>[${REPO_NAME}]</b> ${TITLE}</p><p>${HTML_BODY}</p>"
          }
          EOF
          )

          TXN_ID="gh-$(date +%s%N)-${GITHUB_RUN_ID}"

          HTTP_STATUS=$(curl -s -o /tmp/matrix_response.json -w "%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer ${MATRIX_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${MATRIX_HOMESERVER}/_matrix/client/v3/rooms/${MATRIX_ROOM_ID}/send/m.room.message/${TXN_ID}")

          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/matrix_response.json

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Falha ao enviar mensagem para o Element (status $HTTP_STATUS)"
            exit 1
          fi

          echo "✅ Mensagem enviada com sucesso!"